services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: riot
      POSTGRES_USER: riot
      POSTGRES_PASSWORD: riot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riot -d riot"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    command: alembic -c alembic.ini upgrade head

  api:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file: .env
    ports:
      - "8000:8000"
